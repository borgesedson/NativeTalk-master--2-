<!DOCTYPE html>
<html>
<head>
  <title>Clear Service Worker</title>
</head>
<body>
  <h1>Limpando Service Worker...</h1>
  <p id="status">Processando...</p>
  <script>
    async function clearEverything() {
      const status = document.getElementById('status');
      
      // Desregistrar todos os service workers
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (let registration of registrations) {
          await registration.unregister();
          status.innerHTML += '<br>✅ Service Worker desregistrado';
        }
      }
      
      // Limpar todos os caches
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        for (let cacheName of cacheNames) {
          await caches.delete(cacheName);
          status.innerHTML += '<br>✅ Cache deletado: ' + cacheName;
        }
      }
      
      // Limpar localStorage e sessionStorage
      localStorage.clear();
      sessionStorage.clear();
      status.innerHTML += '<br>✅ Storage limpo';
      
      status.innerHTML += '<br><br><strong>✅ Tudo limpo! Recarregando...</strong>';
      
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    }
    
    clearEverything();
  </script>
</body>
</html>
