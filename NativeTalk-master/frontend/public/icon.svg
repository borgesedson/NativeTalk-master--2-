<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#4f46e5" rx="80"/>
  
  <!-- Video Camera Icon -->
  <g fill="#ffffff">
    <!-- Camera body -->
    <rect x="80" y="180" width="280" height="180" rx="20"/>
    
    <!-- Lens -->
    <circle cx="220" cy="270" r="60" fill="#4f46e5"/>
    <circle cx="220" cy="270" r="40" fill="#ffffff"/>
    
    <!-- Triangle play button -->
    <path d="M 360 200 L 440 270 L 360 340 Z"/>
  </g>
  
  <!-- Translation symbol -->
  <g fill="#fbbf24" stroke="#ffffff" stroke-width="3">
    <text x="140" y="150" font-size="80" font-weight="bold" font-family="Arial">A</text>
    <text x="300" y="420" font-size="80" font-weight="bold" font-family="Arial">あ</text>
  </g>
</svg>
